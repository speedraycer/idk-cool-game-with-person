<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root { --g: #00ff41; --gd: #0a4018; --r: #ff2222; }
  html, body {
    height: 100%; background: #000; color: var(--g);
    font-family: "Courier New", ui-monospace, monospace;
    overflow: hidden; user-select: none; -webkit-user-select: none;
  }
  #matrix { position: fixed; inset: 0; z-index: 0; opacity: 0.35; }

  header {
    display: flex; align-items: center; gap: 8px; padding: 10px 14px;

  #term {
    flex: 1; overflow-y: auto; padding: 12px 14px; font-size: 13.5px; line-height: 1.45;
    white-space: pre-wrap; word-break: break-word; text-shadow: 0 0 5px rgba(0,255,65,.6);
  }
  #term .cmd { color: #fff; }
  #term .ok { color: var(--g); }
  #term .warn { color: #ffcc00; }
  #term .bad { color: var(--r); text-shadow: 0 0 6px var(--r); }
  #term .dim { color: #2c8f42; }
  .cursor { display: inline-block; width: 9px; height: 15px; background: var(--g);
    vertical-align: -2px; box-shadow: 0 0 8px var(--g); animation: blink .8s step-end infinite; }
  #pad {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 10px 14px 16px;
    border-top: 1px solid var(--gd); background: rgba(0,10,0,.55);
  }
  button.op {
    appearance: none; background: rgba(0,40,10,.6); color: var(--g);
    border: 1px solid var(--g); border-radius: 6px; padding: 13px 8px;
    font-family: inherit; font-size: 13px; font-weight: bold; letter-spacing: .5px;
    text-shadow: 0 0 6px var(--g); box-shadow: 0 0 10px rgba(0,255,65,.15) inset; cursor: pointer;

  }
  button.op:active { transform: scale(.95); background: rgba(0,255,65,.25); }
  button.op.wide { grid-column: 1 / -1; }
  button.op.danger { border-color: var(--r); color: var(--r); text-shadow: 0 0 6px var(--r); }
  #target {
    grid-column: 1 / -1; background: #000; border: 1px solid var(--gd); color: var(--g);
    font-family: inherit; font-size: 14px; padding: 11px; border-radius: 6px; text-align: center;
    text-shadow: 0 0 5px var(--g);
  }
  #target::placeholder { color: var(--gd); }
  /* full screen ACCESS GRANTED / DENIED flash */
  #flash {
    position: fixed; inset: 0; z-index: 5; display: none; align-items: center; justify-content: center;
    flex-direction: column; text-align: center; padding: 20px; font-weight: bold;
  }
  #flash.show { display: flex; }
  #flash .big { font-size: 40px; letter-spacing: 3px; }
  #flash .sub { font-size: 15px; margin-top: 14px; opacity: .85; }
  #flash.granted { background: rgba(0,20,0,.94); color: var(--g); text-shadow: 0 0 18px var(--g); animation: pop .3s; }
  #flash.denied  { background: rgba(30,0,0,.94); color: var(--r); text-shadow: 0 0 18px var(--r); animation: shake .35s; }
  @keyframes pop { from { transform: scale(.6); opacity: 0; } }
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-14px)} 40%{transform:translateX(14px)} 60%{transform:translateX(-9px)} 80%{transform:translateX(9px)} }
  .barwrap { margin: 4px 0; }
  .bar { height: 12px; border: 1px solid var(--gd); background: #001a06; overflow: hidden; }
  .bar > i { display: block; height: 100%; width: 0; background: var(--g); box-shadow: 0 0 10px var(--g); }
  #term::-webkit-scrollbar { width: 4px; }
  #term::-webkit-scrollbar-thumb { background: var(--gd); }

  function audio() { if (!ac && AC) { try { ac = new AC(); } catch (e) {} } if (ac && ac.state === "suspended") ac.resume(); return ac; }
  function beep(freq, dur, type, vol) {
    var c = audio(); if (!c) return;
    var o = c.createOscillator(), g = c.createGain();

    g.gain.value = vol == null ? 0.06 : vol;

  function loadVoices() { try { VOICES = window.speechSynthesis ? speechSynthesis.getVoices() : []; } catch (e) { VOICES = []; } }

    if (!VOICES.length) loadVoices();
    var en = VOICES.filter(function (v) { return /en[-_]/i.test(v.lang || ""); });

  var cursorEl = null;

  function ensureCursor() {
    if (!cursorEl) { cursorEl = document.createElement("span"); cursorEl.className = "cursor"; }

  function wait(ms) { return new Promise(function (r) { setTimeout(r, ms); }); }

  // animated progress bar

    return new Promise(function (res) {
